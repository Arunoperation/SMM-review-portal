<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMM Review Portal</title>



<style>
:root{
  --navy:#1a2f54;--blue:#2060b0;--blue-l:#e8f1fb;--sky:#4d90d4;
  --green:#1a6038;--green-l:#e4f2ea;
  --amber:#b45000;--amber-l:#fff0d6;
  --red:#991b1b;--red-l:#fde8e8;
  --purple:#5b21b6;--purple-l:#ede9fe;
  --gray0:#f5f7fa;--gray1:#edf0f5;--gray2:#dde2ea;
  --gray3:#98a5b8;--gray4:#5c6678;--text:#1a2233;
  --white:#fff;--r:8px;--sh:0 2px 12px rgba(26,47,84,.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:var(--gray0);color:var(--text);font-size:14px;}

/* LOADING */
#loadScr{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:14px;}
#loadScr .spin{font-size:42px;animation:rot 1.2s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}

/* LOGIN */
#loginScr{display:none;min-height:100vh;background:linear-gradient(145deg,var(--navy),#2060b0);align-items:center;justify-content:center;padding:20px;}
.loginBox{background:var(--white);border-radius:18px;padding:40px 36px 32px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(0,0,0,.28);}
.lHead{text-align:center;margin-bottom:28px;}
.lBadge{display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;background:var(--navy);border-radius:14px;font-size:28px;margin-bottom:12px;}
.lHead h1{font-size:20px;font-weight:700;color:var(--navy);}
.lHead p{font-size:12px;color:var(--gray3);margin-top:3px;}
.lFld{margin-bottom:14px;}
.lFld label{display:block;font-size:11px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.lFld input{width:100%;padding:10px 13px;border:1.5px solid var(--gray2);border-radius:var(--r);font-size:14px;outline:none;transition:border .2s;}
.lFld input:focus{border-color:var(--blue);}
.btnSignIn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .2s;}
.btnSignIn:hover{background:var(--navy);}
.loginErr{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:16px;}
.cfgWarn{background:var(--amber-l);border:1px solid #f0a040;border-radius:7px;padding:11px 13px;font-size:12px;color:var(--amber);margin-bottom:14px;line-height:1.5;}

/* APP SHELL */
#appScr{display:none;flex-direction:column;min-height:100vh;}
.bar{background:var(--navy);color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.barBrand{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.barDot{width:8px;height:8px;background:#4ade80;border-radius:50%;}
.barRight{display:flex;align-items:center;gap:10px;}
.rolePill{background:rgba(255,255,255,.16);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;}
.barUser{font-size:12px;color:rgba(255,255,255,.72);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btnOut{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.85);padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;}

.shell{display:flex;flex:1;min-height:0;}

/* SIDEBAR */
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--gray2);overflow-y:auto;flex-shrink:0;padding:8px 0;}
.siGrp{font-size:10px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.8px;padding:12px 16px 5px;}
.siItem{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;color:var(--gray4);cursor:pointer;border-left:3px solid transparent;transition:all .15s;user-select:none;}
.siItem:hover{background:var(--blue-l);color:var(--blue);}
.siItem.act{background:var(--blue-l);color:var(--navy);border-left-color:var(--blue);font-weight:600;}
.siIcon{width:20px;text-align:center;flex-shrink:0;font-size:15px;}
.siBadge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;}

/* MODULE COLOR BANDS */
.siItem[data-mod="1"]:hover,.siItem[data-mod="1"].act{background:#e4f2ea;color:var(--green);border-left-color:var(--green);}
.siItem[data-mod="2"]:hover,.siItem[data-mod="2"].act{background:var(--purple-l);color:var(--purple);border-left-color:var(--purple);}

/* MAIN */
.mainArea{flex:1;overflow-y:auto;}
.mainWrap{padding:20px 22px 48px;max-width:1080px;}

/* BOTTOM NAV */
.bnav{display:none;background:var(--white);border-top:1px solid var(--gray2);padding:5px 0 max(env(safe-area-inset-bottom),5px);position:sticky;bottom:0;z-index:200;}
.bnavRow{display:flex;justify-content:space-around;}
.bnavItem{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 6px;cursor:pointer;border-radius:8px;min-width:50px;}
.bnavItem.act .bnavLbl{color:var(--blue);}
.bnavIco{font-size:20px;}
.bnavLbl{font-size:10px;font-weight:600;color:var(--gray4);}

/* PAGE ELEMENTS */
.pgTitle{font-size:19px;font-weight:700;color:var(--navy);}
.pgSub{font-size:12px;color:var(--gray3);margin-top:2px;margin-bottom:18px;}
.modBand{display:inline-flex;align-items:center;gap:6px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:18px;}
.modBand1{background:var(--green-l);color:var(--green);}
.modBand2{background:var(--purple-l);color:var(--purple);}

/* CARDS */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px;}
.cardHd{font-size:13px;font-weight:700;color:var(--navy);padding-bottom:10px;border-bottom:1px solid var(--gray1);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}

/* SECTION CHECKLIST */
.sectionBlock{border:1px solid var(--gray2);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.sectionHead{background:var(--navy);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.sectionHead h4{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.sectionHead .sCount{font-size:11px;opacity:.75;}
.sectionBody{padding:14px 16px;}
.checkItem{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:6px;background:var(--gray0);font-size:12px;line-height:1.5;}
.checkItem:last-child{margin-bottom:0;}
.checkItem .cIcon{flex-shrink:0;font-size:15px;margin-top:1px;}
.checkItem .cText{flex:1;color:var(--text);}
.checkItem .cStatus{flex-shrink:0;margin-left:6px;}

/* UPLOAD */
.uploadZone{border:2px dashed var(--gray2);border-radius:var(--r);padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gray0);margin-bottom:8px;}
.uploadZone:hover,.uploadZone.drag{border-color:var(--blue);background:var(--blue-l);}
.uzIco{font-size:28px;margin-bottom:6px;}
.uploadZone p{font-size:13px;color:var(--gray4);}
.uploadZone p b{color:var(--blue);}
.uploadZone small{font-size:11px;color:var(--gray3);}
.pendRow{display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--blue-l);border:1px solid #93c5fd;border-radius:6px;margin-top:6px;}
.pName{flex:1;font-size:12px;font-weight:500;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pSize{font-size:11px;color:var(--gray3);white-space:nowrap;}
.pRem{cursor:pointer;color:var(--red);padding:2px 5px;border-radius:3px;font-size:14px;}

/* FILE ROWS */
.fileRow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--gray2);border-radius:7px;margin-bottom:6px;background:var(--gray0);}
.fileRow:hover{background:var(--blue-l);}
.frIco{font-size:18px;flex-shrink:0;}
.frInfo{flex:1;min-width:0;}
.frName{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.frMeta{font-size:11px;color:var(--gray3);margin-top:1px;}
.frActs{display:flex;gap:4px;flex-shrink:0;}

/* PROGRESS */
.progWrap{background:var(--gray2);border-radius:8px;height:6px;overflow:hidden;margin-top:5px;}
.progBar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--blue),var(--sky));transition:width .3s;}

/* STATS */
.statsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
.statBox{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:13px 15px;}
.stLbl{font-size:10px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.stNum{font-size:24px;font-weight:700;color:var(--navy);}
.stSub{font-size:11px;color:var(--gray3);}

/* MODULE OVERVIEW CARDS */
.modCard{border-radius:var(--r);padding:18px;margin-bottom:12px;cursor:pointer;transition:box-shadow .18s;border:1.5px solid transparent;}
.modCard:hover{box-shadow:0 6px 20px rgba(26,47,84,.14);}
.modCard1{background:linear-gradient(135deg,#e4f2ea,#f0f8f0);border-color:#a8d5b8;}
.modCard2{background:linear-gradient(135deg,#ede9fe,#f5f0ff);border-color:#c4b5fd;}
.modCardTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.modCardTitle{font-size:15px;font-weight:700;color:var(--navy);}
.modCardSubs{font-size:12px;color:var(--gray4);margin-bottom:10px;}
.modProgress{display:flex;align-items:center;gap:10px;}
.modPct{font-size:13px;font-weight:700;color:var(--navy);min-width:38px;}

/* GAP MATRIX */
.matrixWrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh);}
.matrix{width:100%;border-collapse:collapse;font-size:12px;}
.matrix th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.4px;}
.matrix td{padding:7px 10px;border-bottom:1px solid var(--gray1);white-space:nowrap;}
.matrix tr:last-child td{border-bottom:none;}
.matrix tr:hover td{background:var(--gray0);}
.cellOk{text-align:center;color:var(--green);font-size:14px;}
.cellMiss{text-align:center;color:var(--red);font-size:14px;}
.cellPart{text-align:center;color:var(--amber);font-size:14px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btnP{background:var(--blue);color:#fff;}
.btnP:hover:not(:disabled){background:var(--navy);}
.btnS{background:var(--green);color:#fff;}
.btnS:hover:not(:disabled){opacity:.85;}
.btnO{background:var(--white);color:var(--navy);border:1.5px solid var(--gray2);}
.btnO:hover:not(:disabled){border-color:var(--blue);color:var(--blue);}
.btnD{background:var(--red);color:#fff;}
.btnSm{padding:5px 10px;font-size:11px;}
.btnIc{background:none;border:none;font-size:16px;cursor:pointer;padding:3px;border-radius:4px;}
.btnIc:hover{background:var(--gray2);}
.btnRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.pg{background:var(--green-l);color:var(--green);}
.pa{background:var(--amber-l);color:var(--amber);}
.pr{background:var(--red-l);color:var(--red);}
.pb{background:var(--blue-l);color:var(--blue);}
.pp{background:var(--purple-l);color:var(--purple);}
.px{background:var(--gray1);color:var(--gray4);}

/* AI PANEL */
.aiBox{background:linear-gradient(135deg,#0f1f44,#1c3468);border-radius:var(--r);padding:18px;color:#fff;margin-bottom:14px;}
.aiBox h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.aiBox .aiSub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:12px;}
.aiKeyRow{display:flex;gap:8px;margin-bottom:10px;}
.aiKeyRow input{flex:1;padding:9px 11px;border-radius:6px;border:none;font-size:13px;background:rgba(255,255,255,.13);color:#fff;outline:none;}
.aiKeyRow input::placeholder{color:rgba(255,255,255,.38);}
.aiKeyRow input:focus{background:rgba(255,255,255,.2);}
.aiCtrl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.aiCtrl select{padding:8px 12px;border-radius:6px;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:13px;outline:none;}
.aiCtrl select option{background:#1c3468;color:#fff;}
.aiBtnRun{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;}
.aiBtnRun:hover:not(:disabled){background:rgba(255,255,255,.28);}
.aiBtnRun:disabled{opacity:.4;cursor:not-allowed;}
.aiResult{background:rgba(255,255,255,.07);border-radius:6px;padding:14px;font-size:13px;line-height:1.78;max-height:400px;overflow-y:auto;white-space:pre-wrap;margin-top:10px;}

/* SUMMARY CARD */
.sumCard{border:1px solid var(--gray2);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.sumHead{background:var(--navy);color:#fff;padding:11px 15px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.sumHead h4{font-size:13px;font-weight:700;}
.sumHead .smeta{font-size:11px;opacity:.65;}
.sumBody{padding:14px 16px;font-size:13px;line-height:1.75;background:var(--white);white-space:pre-wrap;}

/* MODAL */
.mOvr{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center;}
.mOvr.ctr{align-items:center;padding:20px;}
.mBox{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:sup .2s ease;}
.mOvr.ctr .mBox{border-radius:12px;animation:fin .16s ease;}
@keyframes sup{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fin{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.mHead{padding:16px 19px;border-bottom:1px solid var(--gray1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.mHead h3{font-size:15px;font-weight:700;color:var(--navy);}
.mBody{padding:19px;}
.mFoot{padding:13px 19px;border-top:1px solid var(--gray1);display:flex;justify-content:flex-end;gap:8px;}
.f2{margin-bottom:12px;}
.f2 label{display:block;font-size:11px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.f2 input,.f2 select,.f2 textarea{width:100%;padding:9px 11px;border:1.5px solid var(--gray2);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit;color:var(--text);transition:border .2s;}
.f2 input:focus,.f2 select:focus,.f2 textarea:focus{border-color:var(--blue);}

/* TABS */
.tabs{display:flex;gap:3px;border-bottom:2px solid var(--gray2);margin-bottom:16px;}
.tab{padding:8px 15px;font-size:13px;font-weight:600;color:var(--gray4);cursor:pointer;border-radius:7px 7px 0 0;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .14s;}
.tab:hover{color:var(--blue);}
.tab.act{color:var(--navy);border-bottom-color:var(--blue);background:var(--blue-l);}

/* TOAST */
#toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .26s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* UTIL */
.hidden{display:none!important;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb0{margin-bottom:0;}
.tblWrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh);}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--navy);color:#fff;text-align:left;padding:8px 11px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;white-space:nowrap;}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--gray1);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--gray0);}

@media(max-width:640px){
  .sidebar{display:none;}.bnav{display:block;}
  .mainWrap{padding:12px 12px 80px;}
  .statsGrid{grid-template-columns:repeat(2,1fr);}
  .pgTitle{font-size:16px;}
  .mOvr{padding:0;}
  .barUser{display:none;}
  .aiKeyRow{flex-direction:column;}
}
</style>
</head>
<body>

<div id="loadScr"><div class="spin">⚙️</div><p style="font-size:13px;opacity:.7">Connecting...</p></div>

<div id="loginScr" style="display:none;flex-direction:column;">
  <div class="loginBox">
    <div class="lHead"><div class="lBadge">⚙️</div><h1>SMM Review Portal</h1><p>Manufacturing Excellence · Monthly Reports</p></div>
    <div id="cfgWarn" class="cfgWarn hidden">⚠️ Firebase not configured. Open the HTML file in Notepad and paste your Firebase config (see setup guide).</div>
    <div class="lFld"><label>Username</label><input id="liU" type="text" placeholder="Enter username" ></div>
    <div class="lFld"><label>Password</label><input id="liP" type="password" placeholder="Password" ></div>
    <button class="btnSignIn" id="signInBtn">Sign In →</button>
    <div class="loginErr" id="loginErr"></div>
  </div>
</div>

<div id="appScr" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="bar">
    <div class="barBrand"><div class="barDot"></div>SMM Review Portal</div>
    <div class="barRight">
      <span class="rolePill" id="topRole"></span>
      <span class="barUser" id="topUser"></span>
      <button class="btnOut" style="margin-right:6px" id="chgPwBtn">🔑 Password</button><button class="btnOut" id="logoutBtn">Sign out</button>
    </div>
  </div>
  <div class="shell">
    <div class="sidebar" id="sideEl">
      <div id="sidebarContent"></div>
    </div>
    <div class="mainArea"><div class="mainWrap" id="mc"></div></div>
  </div>
  <nav class="bnav"><div class="bnavRow" id="bnavRow"></div></nav>
</div>

<div id="toast"></div>
<div id="modRoot"></div>

<script>
// ═══════════════════════════════════════════════════
// MODULE STRUCTURE — exactly from consultant report
// ═══════════════════════════════════════════════════
// ══ DEFAULT SECTIONS (used to seed Firestore on first run) ══
window.DEFAULT_SECTIONS = window.DEFAULT_SECTIONS || {};

// ════════════════════════════════════════════════════
// TOOL LIBRARY — pick a tool name when creating a module/section,
// and its icon fills in automatically. Admin can still type a custom
// name if the tool isn't in this list (icon defaults to a folder).
// ════════════════════════════════════════════════════
window.TOOL_LIBRARY = [
  {name:'5S', icon:'🏭'},
  {name:'Visual Management', icon:'📋'},
  {name:'Gemba Walk', icon:'👣'},
  {name:'KPI', icon:'📊'},
  {name:'OEE', icon:'📈'},
  {name:'Losses Analysis', icon:'📉'},
  {name:'RCA / Why-Why', icon:'🔍'},
  {name:'Skill Matrix', icon:'🎓'},
  {name:'KANBAN', icon:'🔄'},
  {name:'PFMEA', icon:'⚠️'},
  {name:'Constraint Management', icon:'🔩'},
  {name:'MSA', icon:'📐'},
  {name:'SPC', icon:'📏'},
  {name:'TPM AM', icon:'🔧'},
  {name:'Layered Process Audits', icon:'🧐'},
  {name:'Quality Alerts', icon:'🚨'},
  {name:'Kaizen Events', icon:'💡'},
  {name:'Six Sigma', icon:'🎯'},
  {name:'Project Tracker', icon:'📁'},
  {name:'Audit Score', icon:'📝'},
  {name:'Training', icon:'🧑\u200d🏫'},
  {name:'Maintenance', icon:'🛠️'},
  {name:'Safety', icon:'🦺'},
  {name:'Custom / Other', icon:'📦'},
];
function findToolIcon(name){
  const t = window.TOOL_LIBRARY.find(t=>t.name.toLowerCase()===String(name||'').toLowerCase());
  return t ? t.icon : '📦';
}


// Live sections loaded from Firestore — updated by loadSections()
window.SECTIONS = window.SECTIONS || {...(window.DEFAULT_SECTIONS||{})};
window.MODULES = window.MODULES || {}; // moduleId → {id, name, order}

// Helpers that work with dynamic sections
function getSectionKeys(){ return Object.keys(window.SECTIONS); }
function getModKeys(modNum){ return getSectionKeys().filter(k=>window.SECTIONS[k].mod===modNum); }
function getAllModNums(){ return [...new Set(getSectionKeys().map(k=>window.SECTIONS[k].mod))].sort(); }
function sectionBelongsToModule(s, m){
  if(s.modId) return s.modId === m.id; // reliable match
  return s.mod === m.order || s.mod === parseInt(m.order); // legacy fallback
}

async function seedIfEmpty(){
  const {collection,getDocs,doc,setDoc}=window.FS;
  const snap=await getDocs(collection(window.DB,'users'));
  if(snap.empty){
    await setDoc(doc(collection(window.DB,'users')),{name:'Arun (Coordinator)',username:'arun',password:'arun123',role:'coordinator',zoneId:'',zoneName:'All Zones'});
    const zones=[{name:'Zone 1',desc:'Pattern Moulding & Assembly'},{name:'Zone 2',desc:'Wax Dipping & Shell Building'},{name:'Zone 3',desc:'Dewax & Casting'},{name:'Zone 4',desc:'Knockout & Fettling'},{name:'Zone 5',desc:'Heat Treatment'},{name:'Zone 6',desc:'NDT / Quality'},{name:'Zone 7',desc:'Machining / CNC'},{name:'Zone 8',desc:'Dispatch & Packing'}];
    for(const z of zones) await setDoc(doc(collection(window.DB,'zones')),z);
    // Seed modules
    const mods=[{id:'mod1',name:'5S & Workplace',colorKey:'green',order:1},{id:'mod2',name:'Operations Excellence',colorKey:'purple',order:2}];
    for(const m of mods) await setDoc(doc(window.DB,'modules',m.id),m);
    // Seed sections from defaults
    for(const [sid,sec] of Object.entries(window.DEFAULT_SECTIONS||{})){
      await setDoc(doc(window.DB,'sections',sid),{...sec,id:sid});
    }
  }
  await loadSectionsAndModules();
}

async function loadSectionsAndModules(){
  try{
    const {collection,getDocs,doc,setDoc}=window.FS;
    const [secSnap,modSnap]=await Promise.all([
      getDocs(collection(window.DB,'sections')),
      getDocs(collection(window.DB,'modules'))
    ]);

    if(secSnap.empty){
      // Sections not in Firestore yet — seed from defaults and use defaults
      for(const [sid,sec] of Object.entries(window.DEFAULT_SECTIONS||{})){
        await setDoc(doc(window.DB,'sections',sid),{...sec,id:sid});
      }
      // Use DEFAULT_SECTIONS as-is (already in window.SECTIONS)
    } else {
      // Load from Firestore
      window.SECTIONS={};
      secSnap.docs.forEach(d=>{
        const dat=d.data();
        window.SECTIONS[d.id]={...dat,id:d.id};
      });
    }

    if(modSnap.empty){
      // Seed default modules
      const defMods=[
        {id:'mod1',name:'5S & Workplace',colorKey:'green',order:1},
        {id:'mod2',name:'Operations Excellence',colorKey:'purple',order:2}
      ];
      for(const m of defMods){
        await setDoc(doc(window.DB,'modules',m.id),m);
        window.MODULES[m.id]=m;
      }
    } else {
      window.MODULES={};
      modSnap.docs.forEach(d=>window.MODULES[d.id]={...d.data(),id:d.id});
    }

    // ── ONE-TIME AUTO-REPAIR: fix duplicate module order numbers ──
    // (This was a bug — multiple modules could share the same order, causing
    //  their sections to incorrectly merge together. This repairs it permanently.)
    const allMods = Object.values(window.MODULES);
    const seenOrders = {};
    let neededRepair = false;
    for(const m of allMods){
      const ord = m.order||1;
      if(seenOrders[ord] !== undefined){
        // Collision found — reassign this module to the next free order
        let newOrder = Math.max(...allMods.map(mm=>mm.order||0)) + 1;
        await setDoc(doc(window.DB,'modules',m.id),{order:newOrder},{merge:true});
        m.order = newOrder;
        neededRepair = true;
        console.warn(`Auto-repaired module "${m.name}": order changed to ${newOrder} (was colliding with another module)`);
      } else {
        seenOrders[ord] = m.id;
      }
    }

    // Re-link every section to its module by modId (permanent, collision-proof fix)
    // Sections without modId get matched by their CURRENT mod number once, then saved with modId forever after
    for(const sec of Object.values(window.SECTIONS)){
      if(!sec.modId){
        const matchingMod = allMods.find(m => (m.order===sec.mod));
        if(matchingMod){
          sec.modId = matchingMod.id;
          await setDoc(doc(window.DB,'sections',sec.id),{modId:matchingMod.id},{merge:true});
        }
      }
    }
    if(neededRepair){
      toast('🔧 Fixed a module numbering conflict automatically.', 4000);
    }
  }catch(e){
    console.warn('loadSections error:',e);
    // Fallback: use DEFAULT_SECTIONS so app still works
  }
  buildSidebar();
}

// ─── AUTH ───
async function login(){
  const u=$('liU').value.trim().toLowerCase(), p=$('liP').value;
  $('loginErr').textContent='';
  if(!u||!p){$('loginErr').textContent='Enter username and password.';return;}
  try{
    const {collection,query,where,getDocs}=window.FS;
    const snap=await getDocs(query(collection(window.DB,'users'),where('username','==',u)));
    if(snap.empty){$('loginErr').textContent='User not found.';return;}
    const d=snap.docs[0];
    const ud=d.data();
    if(ud.password!==p){$('loginErr').textContent='Wrong password.';return;}
    CU={id:d.id,...ud};
    $('loginScr').style.display='none';
    $('appScr').style.display='flex';
    $('topRole').textContent={admin:'Admin',coordinator:'Admin',consultant:'Consultant',leader:'Leader',dept_leader:'Leader'}[CU.role]||CU.role;
    $('topUser').textContent=CU.name;
    // Load this leader's zone permissions (module/section visibility)
    if(CU.role==='leader' && CU.zoneId){
      try{
        const {doc,getDoc}=window.FS;
        const zSnap=await getDoc(doc(window.DB,'zones',CU.zoneId));
        if(zSnap.exists()) window.MY_ZONE = {id:zSnap.id, ...zSnap.data()};
      }catch(e){console.warn('zone perm load error',e);}
    }
    // Load this department leader's permissions (module/section visibility)
    if(CU.role==='dept_leader' && CU.deptId){
      try{
        const {doc,getDoc}=window.FS;
        const dSnap=await getDoc(doc(window.DB,'departments',CU.deptId));
        if(dSnap.exists()) window.MY_DEPT = {id:dSnap.id, ...dSnap.data()};
      }catch(e){console.warn('dept perm load error',e);}
    }
    // Admin items shown via buildSidebar() which checks CU.role
    buildBnav();

    goto('dash');
    const lb=document.getElementById('logoutBtn');
    const cp=document.getElementById('chgPwBtn');
    if(lb) lb.onclick=logout;
    if(cp) cp.onclick=changeMyPassword;
    const defaultPasses=['arun123','leader123','pass123','123456','password','admin123'];
    if(defaultPasses.includes(p)) setTimeout(()=>toast('⚠️ Default password detected. Click 🔑 Password to change it.',5000),1500);
  }catch(e){$('loginErr').textContent='Error: '+e.message;}
}

function goto(p){
  // Clear any open item-folder state when navigating to a section from sidebar/bnav
  if(window['_item_'+p]!==undefined) delete window['_item_'+p];
  CP=p;
  document.querySelectorAll('.bnavItem').forEach(el=>el.classList.remove('act'));
  const bn=$('bn-'+p);if(bn)bn.classList.add('act');
  buildSidebar();
  render();
}

  if(CP==='dash'){renderDash();return;}
  if(CP==='ai_sum'){renderAI();return;}

  if(CP==='users'){renderUsers();return;}
  if(CP==='zones'){renderZones();return;}
  if(CP==='departments'){renderDepartments();return;}
  if(CP==='modules_admin'){renderModulesAdmin();return;}

    renderSection(CP);return;
  }
  mc.innerHTML='<p style="color:var(--gray3);font-size:13px;padding:40px;text-align:center">Section not found. Try refreshing the page.</p>';
}

async function renderDash(){
  const mc=$('mc');
  const {collection,query,where,getDocs}=window.FS;
  const isAdmin = CU.role==='coordinator' || CU.role==='admin'; // only coordinator has admin view
  const isLeaderType = CU.role==='leader' || CU.role==='dept_leader';

  // Determine which sections THIS user is allowed to see (zone- or dept-filtered)
  const myZone = (CU.role==='leader') ? window.MY_ZONE : null;
  const myDept = (CU.role==='dept_leader') ? window.MY_DEPT : null;
  const myEntity = myZone || myDept;
  const allowedModules = myEntity ? myEntity.allowedModules : null;
  const allowedSections = myEntity ? myEntity.allowedSections : null;

  function isSectionVisible(s){
    if(allowedModules && !allowedModules.includes(s.mod)) return false;
    if(allowedSections && !allowedSections.includes(s.id)) return false;
    return true;
  }

  const visibleSectionKeys = Object.values(window.SECTIONS||{}).filter(isSectionVisible).map(s=>s.id);

  let uQ;
  if(CU.role==='leader') uQ=query(collection(window.DB,'uploads'),where('zoneId','==',CU.zoneId),where('month','==',CURMONTH));
  else if(CU.role==='dept_leader') uQ=query(collection(window.DB,'uploads'),where('deptId','==',CU.deptId),where('month','==',CURMONTH));
  else uQ=query(collection(window.DB,'uploads'),where('month','==',CURMONTH));
  const uSnap=await getDocs(uQ);
  let uploads=uSnap.docs.map(d=>({id:d.id,...d.data()}));

  // For zone/dept leaders, only count sections they're allowed to see
  if(isLeaderType){
    uploads = uploads.filter(u=>visibleSectionKeys.includes(u.sectionId));
  }

  const totalSections = isLeaderType ? visibleSectionKeys.length : getSectionKeys().length;
  const coveredSections=new Set(uploads.map(u=>u.sectionId)).size;
  const pct = totalSections ? Math.round(coveredSections/totalSections*100) : 0;

  // Build module cards dynamically based on what modules exist (and are visible to this user)
  const allModNums = getAllModNums();
  const visibleModNums = isLeaderType
    ? (allowedModules ? allModNums.filter(n=>allowedModules.includes(n)) : allModNums)
    : allModNums;

  function modName(num){
    const found = Object.values(window.MODULES||{}).find(m=>m.order===num||m.id==='mod'+num);
    return found ? found.name : 'Module '+num;
  }
  function modColorKey(num){
    const found = Object.values(window.MODULES||{}).find(m=>m.order===num||m.id==='mod'+num);
    return found?.colorKey||'blue';
  }
  const colorVar = {green:'var(--green)',purple:'var(--purple)',blue:'var(--blue)',amber:'var(--amber)',red:'var(--red)',navy:'var(--navy)'};

  const modCardsHTML = visibleModNums.map(num=>{
    let modKeys = getModKeys(num);
    if(isLeaderType && allowedSections) modKeys = modKeys.filter(k=>allowedSections.includes(k));
    const modCov = modKeys.filter(k=>uploads.find(u=>u.sectionId===k)).length;
    const modPct = modKeys.length ? Math.round(modCov/modKeys.length*100) : 0;
    const color = colorVar[modColorKey(num)]||'var(--blue)';
    const sectionNames = modKeys.map(k=>window.SECTIONS[k]?.label).filter(Boolean).join(' · ');
    const firstKey = modKeys[0];
    return `<div class="modCard" style="background:${color}12;border-color:${color}55" ${firstKey?`onclick="goto('${firstKey}')"`:''}>
      <div class="modCardTop">
        <div class="modCardTitle" style="color:${color}">${esc(modName(num))}</div>
        <span class="pill" style="background:${color}22;color:${color}">${modCov}/${modKeys.length} sections</span>
      </div>
      <div class="modCardSubs">${esc(sectionNames)||'No sections yet'}</div>
      <div class="modProgress"><div class="progWrap" style="flex:1"><div class="progBar" style="background:${color};width:${modPct}%"></div></div><div class="modPct">${modPct}%</div></div>
    </div>`;
  }).join('');

  // Zone matrix (admin only) — still shows ALL zones/sections for oversight
  let matrixHTML='';
  if(isAdmin){
    const [zSnap,dSnap]=await Promise.all([
      getDocs(collection(window.DB,'zones')),
      getDocs(collection(window.DB,'departments'))
    ]);
    const zones=zSnap.docs.map(d=>({id:d.id,...d.data(),_type:'zone'}));
    const depts=dSnap.docs.map(d=>({id:d.id,...d.data(),_type:'dept'}));
    const allEntities=[...zones,...depts];

    const allUQ=query(collection(window.DB,'uploads'),where('month','==',CURMONTH));
    const allU=(await getDocs(allUQ)).docs.map(d=>({id:d.id,...d.data()}));

    const allSecsList = Object.values(window.SECTIONS||{}).sort((a,b)=>(a.mod-b.mod)||((a.order||0)-(b.order||0)));

    const entityRows=allEntities.map(ent=>{
      const eu = ent._type==='zone'
        ? allU.filter(u=>u.zoneId===ent.id)
        : allU.filter(u=>u.deptId===ent.id);
      const eAllowedMods = ent.allowedModules;
      const eAllowedSecs = ent.allowedSections;
      const cells = allSecsList.map(s=>{
        const isRunningHere = (!eAllowedMods || eAllowedMods.includes(s.mod)) && (!eAllowedSecs || eAllowedSecs.includes(s.id));
        if(!isRunningHere) return `<td style="text-align:center;color:var(--gray3)">—</td>`;
        const n=eu.filter(u=>u.sectionId===s.id).length;
        return `<td class="${n?'cellOk':'cellMiss'}">${n?'✓':'✗'}</td>`;
      }).join('');
      const total=eu.length;
      const typeLabel = ent._type==='zone' ? '' : '<span class="pill pp" style="margin-left:5px;font-size:9px">DEPT</span>';
      return`<tr><td><b>${esc(ent.name)}</b>${typeLabel}</td>${cells}<td><b>${total}</b></td></tr>`;
    }).join('');

    matrixHTML=`<div class="card mt16">
      <div class="cardHd">Zone & Department × Section Matrix — ${CURMONTH}
        <span class="pill ${pct>=80?'pg':pct>=50?'pa':'pr'}">${pct}% covered</span>
      </div>
      <div class="matrixWrap"><table class="matrix">
        <thead><tr><th>Zone / Dept</th>${allSecsList.map(s=>`<th title="${esc(s.label)}">${s.icon}</th>`).join('')}<th>Files</th></tr></thead>
        <tbody>${entityRows}</tbody>
      </table></div>
      <div style="margin-top:8px;font-size:11px;color:var(--gray3);">✓ = uploaded &nbsp;|&nbsp; ✗ = no upload &nbsp;|&nbsp; — = not assigned &nbsp;|&nbsp; <span class="pill pp" style="font-size:9px">DEPT</span> = cross-functional department</div>
    </div>`;
  }

  mc.innerHTML=`
  <div class="pgTitle">👋 ${esc(CU.name)}</div>
  <div class="pgSub">${CU.role==='leader'?(CU.zoneName||CU.zoneId):'All Sections'} · ${CURMONTH}</div>

  <div class="statsGrid">
    <div class="statBox"><div class="stLbl">Files This Month</div><div class="stNum">${uploads.length}</div><div class="stSub">uploaded</div></div>
    <div class="statBox"><div class="stLbl">Sections Covered</div><div class="stNum">${coveredSections}/${totalSections}</div><div class="stSub">of ${totalSections} assigned</div></div>
  </div>

  ${modCardsHTML || '<div class="card"><div style="text-align:center;padding:24px;color:var(--gray3);">No modules assigned to your zone yet. Contact your coordinator.</div></div>'}
  ${matrixHTML}`;
}

async function renderSection(skey){
  const mc=$('mc');
  let sec=window.SECTIONS[skey];
  if(!sec){
    try{
      const {doc,getDoc}=window.FS;
      const snap=await getDoc(doc(window.DB,'sections',skey));
      if(snap.exists()){sec={id:snap.id,...snap.data()};window.SECTIONS[skey]=sec;}
    }catch(e){}
  }
  if(!sec){mc.innerHTML='<div style="text-align:center;padding:40px;color:var(--gray3)">Section not found.</div>';return;}

  const isAdmin=CU.role==='coordinator'||CU.role==='admin'; // only coordinator gets admin file view
  const modObj=Object.values(window.MODULES||{}).find(m=>m.order===sec.mod||m.id==='mod'+sec.mod);
  const modLabel=modObj?modObj.name:('Module '+sec.mod);
  const modBand=`<span class="modBand" style="background:var(--blue-l);color:var(--blue);display:inline-flex;align-items:center;gap:6px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:18px">${modLabel}</span>`;

  // Are we viewing a specific item-folder, or the list of item-folders?
  const activeItemIdx = window['_item_'+skey];

  if(activeItemIdx === undefined || activeItemIdx === null){
    // ── LIST VIEW: show item-folders ──
    await renderSectionItemList(skey, sec, modBand, isAdmin);
  } else {
    // ── DETAIL VIEW: show upload + files for one item ──
    await renderSectionItemDetail(skey, sec, modBand, isAdmin, activeItemIdx);
  }
}

async function renderSectionItemList(skey, sec, modBand, isAdmin){
  const mc=$('mc');
  const {collection,query,where,getDocs}=window.FS;
  const items = sec.required||[];

  // Fetch all uploads for this section (to compute per-item file counts)
  let q;
  if(CU.role==='leader') q=query(collection(window.DB,'uploads'),where('sectionId','==',skey),where('zoneId','==',CU.zoneId));
  else if(CU.role==='dept_leader') q=query(collection(window.DB,'uploads'),where('sectionId','==',skey),where('deptId','==',CU.deptId));
  else q=query(collection(window.DB,'uploads'),where('sectionId','==',skey));
  const snap=await getDocs(q);
  const uploads=snap.docs.map(d=>({id:d.id,...d.data()}));

  const relevantUploads = CU.role==='leader' ? uploads : uploads; // admin sees all already filtered by sectionId

  function countForItem(idx){
    if(CU.role==='leader') return relevantUploads.filter(u=>String(u.checkItem)===String(idx)).length;
    // admin: count across all zones
    return relevantUploads.filter(u=>String(u.checkItem)===String(idx)).length;
  }
  function zonesCoveredForItem(idx){
    const zids = new Set(relevantUploads.filter(u=>String(u.checkItem)===String(idx)).map(u=>u.zoneId));
    return zids.size;
  }

  const generalCount = relevantUploads.filter(u=>u.checkItem===''||u.checkItem===null||u.checkItem===undefined).length;

  const addItemBtn = isAdmin ? `<button class="btn btnP btnSm" onclick="showAddChecklistItem('${skey}')">+ Add Requirement</button>` : '';

  mc.innerHTML = `
  <div class="pgTitle">${sec.icon} ${esc(sec.label)}</div>
  ${modBand}
  <div class="pgSub">${esc(sec.desc||'')}</div>

  <div class="card">
    <div class="cardHd">📁 Requirements — click any item to upload or view files
      ${addItemBtn}
    </div>
    ${items.length ? items.map((item,idx)=>{
      const fileCount = countForItem(idx);
      const zoneCount = isAdmin ? zonesCoveredForItem(idx) : 0;
      const hasFiles = fileCount > 0;
      return `<div class="fileRow" style="cursor:pointer;${hasFiles?'border-color:#93c5fd':''}" onclick="openChecklistItem('${skey}',${idx})">
        <span class="frIco" style="font-size:20px">${hasFiles?'📂':'📁'}</span>
        <div class="frInfo">
          <div class="frName" style="white-space:normal">${idx+1}. ${esc(item)}</div>
          <div class="frMeta">${hasFiles?`${fileCount} file(s) uploaded${isAdmin&&hasFiles?' · '+zoneCount+' zone(s)':''} — <b>click to view & download</b>`:'No files yet — click to upload'}</div>
        </div>
        <div class="frActs">
          ${hasFiles?'<span class="pill pg">✓ Click to open →</span>':'<span class="pill px">Click to upload →</span>'}
          ${isAdmin?`<button class="btnIc" title="Edit requirement text" onclick="event.stopPropagation();editChecklistItem('${skey}',${idx})">✏️</button>
          <button class="btnIc" title="Delete requirement" onclick="event.stopPropagation();deleteChecklistItem('${skey}',${idx})">🗑️</button>`:''}
        </div>
      </div>`;
    }).join('') : `<div style="text-align:center;padding:24px;color:var(--gray3);font-size:13px;">No requirements added yet. ${isAdmin?'Click "+ Add Requirement" above to create one.':'Ask your coordinator to add requirements for this section.'}</div>`}

    <div class="fileRow" style="cursor:pointer;margin-top:10px;border-style:dashed" onclick="openChecklistItem('${skey}','general')">
      <span class="frIco" style="font-size:20px">📦</span>

// ── File handlers for item-detail uploads ──
async function selFilesItem(inp, folderKey){
  if(!pendFiles[folderKey]) pendFiles[folderKey]=[];
  Array.from(inp.files).forEach(f=>pendFiles[folderKey].push({id:uid(),file:f,name:f.name,size:f.size}));
  renderPend(folderKey); inp.value='';
}
function dropFilesItem(e, folderKey){
  e.preventDefault();
  $('uz-'+folderKey)?.classList.remove('drag');
  if(!pendFiles[folderKey]) pendFiles[folderKey]=[];
  Array.from(e.dataTransfer.files).forEach(f=>pendFiles[folderKey].push({id:uid(),file:f,name:f.name,size:f.size}));
  renderPend(folderKey);
}

async function doUploadItem(skey, itemIdx, folderKey){
  const files = pendFiles[folderKey]||[];
  if(!files.length){toast('Select files first.');return;}
  const month = $('upMon-'+folderKey)?.value||CURMONTH;
  const note = $('upNote-'+folderKey)?.value||'';
  const checkItem = itemIdx==='general' ? '' : String(itemIdx);
  const btn=$('upBtn-'+folderKey); const prog=$('upProg-'+folderKey);
  btn.disabled=true;

  const MAX_B64 = 900*1024;
  let uploaded=0;
  for(const pf of files){
    if(pf.size > MAX_B64){
      toast(`"${pf.name}" is ${bytes(pf.size)} — too large for direct upload. Use the Drive/OneDrive link option instead.`,5000);
      continue;
    }
    prog.innerHTML=`<div style="margin-top:8px;background:var(--gray0);border-radius:6px;padding:9px 12px;font-size:12px;">
      <div style="margin-bottom:4px;color:var(--navy);font-weight:500;">☁️ Saving ${esc(pf.name)}...</div>
      <div class="progWrap"><div class="progBar" style="width:80%"></div></div>
    </div>`;
    const b64 = await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result);
      r.onerror=rej;
      r.readAsDataURL(pf.file);
    });
    try{
      const {collection,addDoc,serverTimestamp}=window.FS;
      await addDoc(collection(window.DB,'uploads'),{
        sectionId:skey, name:pf.name, size:pf.size, month, checkItem, note,
        zoneId:'', zoneName:'',
        deptId:'', deptName:'',
        uploadedById:CU.id, uploadedBy:CU.name,
        fileData:b64,
        uploadedAt:serverTimestamp(), uploadedAtStr:new Date().toLocaleDateString()
      });
      uploaded++;
    }catch(e){ toast('Save error: '+e.message); }
  }
  pendFiles[folderKey]=[];
  btn.disabled=false; prog.innerHTML='';
  if(uploaded>0) toast(`✅ ${uploaded} file(s) saved!`);
  // Explicitly keep the detail view open after upload
  // folderKey = skey+'__'+itemIdx, so extract itemIdx from folderKey
  const _itemIdx = folderKey.replace(skey+'__','');
  window['_item_'+skey] = isNaN(_itemIdx) ? _itemIdx : parseInt(_itemIdx);
  renderSection(skey);
}

// ── FILE HANDLERS ──
function selFiles(inp,sk){
  if(!pendFiles[sk])pendFiles[sk]=[];
  Array.from(inp.files).forEach(f=>pendFiles[sk].push({id:uid(),file:f,name:f.name,size:f.size}));
  renderPend(sk);inp.value='';
}
function dropFiles(e,sk){e.preventDefault();$('uz-'+sk)?.classList.remove('drag');if(!pendFiles[sk])pendFiles[sk]=[];Array.from(e.dataTransfer.files).forEach(f=>pendFiles[sk].push({id:uid(),file:f,name:f.name,size:f.size}));renderPend(sk);}
function renderPend(sk){const el=$('pList-'+sk);if(!el)return;el.innerHTML=(pendFiles[sk]||[]).map(f=>`<div class="pendRow"><span class="pName">${fIcon(f.name)} ${esc(f.name)}</span><span class="pSize">${bytes(f.size)}</span><span class="pRem" onclick="remPend('${sk}','${f.id}')">✕</span></div>`).join('');}
function remPend(sk,id){if(pendFiles[sk])pendFiles[sk]=pendFiles[sk].filter(f=>f.id!==id);renderPend(sk);}

async function doUpload(sk){
  const files=pendFiles[sk]||[];
  if(!files.length){toast('Select files first.');return;}
  const month=$('upMon-'+sk)?.value||CURMONTH;
  const checkItem=$('upItem-'+sk)?.value||'';
  const note=$('upNote-'+sk)?.value||'';
  const btn=$('upBtn-'+sk);const prog=$('upProg-'+sk);
  btn.disabled=true;

  const MAX_B64 = 900*1024; // 900KB raw file limit (~1.2MB as base64 fits in Firestore 1MB doc)
  let uploaded=0;

  for(const pf of files){
    if(pf.size > MAX_B64){
      toast(`⚠️ "${pf.name}" is ${bytes(pf.size)} — too large. Max 900KB. Please compress and re-upload.`,5000);
      prog.innerHTML=`<div style="margin-top:8px;background:var(--amber-l);border:1px solid #f0a040;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--amber);">
        ⚠️ <b>${esc(pf.name)}</b> skipped — ${bytes(pf.size)} exceeds 900KB limit.<br>
        Tip: Compress images in the file, or split into smaller parts.
      </div>`;
      continue;
    }

    prog.innerHTML=`<div style="margin-top:8px;background:var(--gray0);border-radius:6px;padding:9px 12px;font-size:12px;">
      <div style="margin-bottom:4px;color:var(--navy);font-weight:500;">📤 Reading ${esc(pf.name)}...</div>
      <div class="progWrap"><div class="progBar" style="width:60%"></div></div>
    </div>`;

    // Convert file to base64
    const b64 = await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result); // includes data:mime;base64, prefix
      r.onerror=rej;
      r.readAsDataURL(pf.file);
    });

    prog.innerHTML=`<div style="margin-top:8px;background:var(--gray0);border-radius:6px;padding:9px 12px;font-size:12px;">
      <div style="margin-bottom:4px;color:var(--navy);font-weight:500;">☁️ Saving ${esc(pf.name)} to Firestore...</div>
      <div class="progWrap"><div class="progBar" style="width:90%"></div></div>
    </div>`;

    try{
      const {collection,addDoc,serverTimestamp}=window.FS;
      await addDoc(collection(window.DB,'uploads'),{
        sectionId:sk, name:pf.name, size:pf.size, month, checkItem, note,
        zoneId:CU.zoneId||'', zoneName:CU.zoneName||'',
        uploadedById:CU.id, uploadedBy:CU.name,
        fileData:b64,  // stored directly in Firestore
        uploadedAt:serverTimestamp(), uploadedAtStr:new Date().toLocaleDateString()
      });
      uploaded++;
    }catch(e){
      toast('Save error: '+e.message);
    }
  }

  pendFiles[sk]=[];
  btn.disabled=false;
  prog.innerHTML='';
  if(uploaded>0) toast(`✅ ${uploaded} file(s) saved!`);
  renderSection(sk);
}

  if(!confirm('Delete this file?'))return;
  const {doc,deleteDoc}=window.FS;
  await deleteDoc(doc(window.DB,'uploads',id));
  toast('🗑️ Deleted.');render();

async function saveZone(editId){
  const name=$('zN').value.trim();
  const desc=$('zD').value.trim();
  if(!name){toast('Enter zone name.');return;}

  const mods = window._zoneModalMods||[];
  const allowedModules = mods.filter(m=>document.getElementById('zMod_'+m.order)?.checked).map(m=>m.order);

  const {collection,doc,setDoc,addDoc}=window.FS;
  const data = {name, desc, allowedModules};

  if(editId){
    await setDoc(doc(window.DB,'zones',editId),data,{merge:true});
  } else {
    await addDoc(collection(window.DB,'zones'),data);
  }
  closeModal();toast('✅ Zone saved.');renderZones();
}

async function delZone(id){
  if(!confirm('Delete this zone?'))return;
  const {doc,deleteDoc}=window.FS;

async function showZoneSectionsModal(zoneId){

    <div class="mBox" style="max-width:520px">
      <div class="mHead"><h3>🧩 Sections — ${esc(z.name)}</h3><button class="btnIc" onclick="closeModal()">✕</button></div>

        <button class="btn btnP" onclick="saveZoneSections('${zoneId}')">Save</button>
      </div>
    </div>
  </div>`);
}

async function saveZoneSections(zoneId){

  closeModal();toast('✅ Section visibility saved for this zone.');renderZones();

async function saveUser(editId){
  const name=$('mN').value.trim();
  const username=$('mU').value.trim().toLowerCase();
  const password=$('mP').value.trim();
  const role=$('mR').value;
  const zoneId = role==='dept_leader' ? '' : ($('mZ')?.value||'');
  const deptId = role==='dept_leader' ? ($('mDept')?.value||'') : '';
  if(!name||!username||!password){toast('Fill all fields.');return;}
  if(role==='dept_leader' && !deptId){toast('Please select a department.');return;}
  const {collection,doc,setDoc,getDocs,query,where}=window.FS;

  let zoneName='';
  if(zoneId){
    const zSnap=await getDocs(query(collection(window.DB,'zones'),where('__name__','==',zoneId)));
    if(!zSnap.empty) zoneName=zSnap.docs[0].data().name;
  }
  let deptName='';
  if(deptId){
    const dSnap=await getDocs(query(collection(window.DB,'departments'),where('__name__','==',deptId)));
    if(!dSnap.empty) deptName=dSnap.docs[0].data().name;
  }

  const data={name,username,password,role,zoneId,zoneName,deptId,deptName};
  if(editId){
    await setDoc(doc(window.DB,'users',editId),data,{merge:true});
  } else {
    // check duplicate username
    const ex=await getDocs(query(collection(window.DB,'users'),where('username','==',username)));
    if(!ex.empty){toast('Username already exists!');return;}
    await setDoc(doc(collection(window.DB,'users')),data);
  }
  closeModal();toast('✅ User saved.');renderUsers();
}

async function delUser(id){
  if(!confirm('Delete this user?'))return;
  const {doc,deleteDoc}=window.FS;
  await deleteDoc(doc(window.DB,'users',id));
  toast('Deleted.');renderUsers();
}

async function generateSummary(){
  const key=localStorage.getItem('smm_aikey')||'';
  if(!key){toast('Save your Anthropic API key first.');return;}
  const month=$('aiMonSel').value;
  const btn=$('btnGenSum');
  const status=$('genStatus');
  btn.disabled=true;
  status.innerHTML='<div style="color:rgba(255,255,255,.7);font-size:12px;padding:8px 0;"><span class="spin">⏳</span> Fetching upload data from all zones...</div>';

  // Fetch all uploads for this month
  const {collection,query,where,getDocs,doc,setDoc,serverTimestamp}=window.FS;
  const uSnap=await getDocs(query(collection(window.DB,'uploads'),where('month','==',month)));
  const uploads=uSnap.docs.map(d=>({id:d.id,...d.data()}));
  const zSnap=await getDocs(collection(window.DB,'zones'));
  const zones=zSnap.docs.map(d=>({id:d.id,...d.data()}));

  // Build context
  const lines=[`SMM Monthly Report Gap Analysis — Month: ${month}`,``,`Required Folders (${Object.keys(window.SECTIONS||{}).length}):`];
  Object.values(window.SECTIONS||{}).forEach(f=>lines.push(`  [${f.id}] ${f.label||f.name||f.id}: ${f.desc||""}`));
  lines.push('');
  lines.push('Upload Status by Zone:');
  zones.forEach(z=>{
    const zUp=uploads.filter(u=>u.zoneId===z.id);
    lines.push(`\nZone: ${z.name} (${z.desc||''})`);
    Object.values(window.SECTIONS||{}).forEach(f=>{
      const fu=zUp.filter(u=>u.folderId===f.id);
      lines.push(fu.length?`  ✅ ${f.name}: ${fu.map(u=>u.name).join(', ')}`:`  ❌ ${f.name}: MISSING — no files uploaded`);
    });
    lines.push(`  Total files: ${zUp.length}`);
  });

  // Also add historical context
  const histSnap=await getDocs(query(collection(window.DB,'uploads')));
  const allUploads=histSnap.docs.map(d=>({id:d.id,...d.data()}));
  const pastMonths=[...new Set(allUploads.map(u=>u.month))].filter(m=>m!==month).sort().slice(-3);
  if(pastMonths.length){
    lines.push('\n\nHistorical Context (last 3 months):');
    pastMonths.forEach(pm=>{
      const pmUps=allUploads.filter(u=>u.month===pm);
      lines.push(`  ${pm}: ${pmUps.length} files across ${[...new Set(pmUps.map(u=>u.zoneId))].length} zones`);
    });
  }

  status.innerHTML='<div style="color:rgba(255,255,255,.7);font-size:12px;padding:8px 0;"><span class="spin">🤖</span> Claude is analysing all zone submissions...</div>';

  const prompt=`You are a manufacturing excellence consultant reviewing monthly report submissions for an investment casting facility (SMM Review).

The facility runs improvement programs: 5S, Visual Management, OEE, Losses tracking, RCA/Why-Why analysis, KANBAN, PFMEA, TPM, SPC, MSA, Kaizen.

Here is the current submission status:

${lines.join('\n')}

Generate a comprehensive monthly summary report with:

1. **EXECUTIVE SUMMARY** (3-4 lines): Overall health of submissions for ${month}, total files received, zones performing well, zones with issues.

2. **ZONE-WISE STATUS** (for each zone):
   - Files submitted vs required
   - What was submitted (list folder names)  
   - What is MISSING (critical gaps)
   - Brief observation

3. **CRITICAL GAPS** (consolidated list): Every zone+folder combination with missing files. Format: "Zone X → [Folder Name]: Not submitted"

4. **PATTERN OBSERVATIONS**: Any recurring gaps across multiple zones (e.g., "RCA not submitted by 5 out of 8 zones — this is a systemic issue")

5. **RECOMMENDATIONS FOR COORDINATOR (ARUN)**: 5 specific actions before sharing to consultant, with which leader to contact.

6. **CONSULTANT READINESS**: Rate overall readiness (Ready / Partially Ready / Not Ready) and what needs to be done before consultant review.

Be specific. Use zone names. Flag critical missing items clearly. Keep it professional but direct.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    if(data.error){status.innerHTML=`<div style="color:#fca5a5;font-size:12px;padding:8px;">${esc(data.error.message)}</div>`;btn.disabled=false;return;}
    const text=data.content?.find(c=>c.type==='text')?.text||'';

    // Build gap badges
    const gapBadges=[];
    let totalGaps=0;
    zones.forEach(z=>{
      const zUp=uploads.filter(u=>u.zoneId===z.id);
      Object.values(window.SECTIONS||{}).forEach(f=>{
        if(!zUp.find(u=>u.folderId===f.id)){
          gapBadges.push({label:`${z.name} → ${f.icon}`,type:'missing'});
          totalGaps++;
        }
      });
    });

    // Save to Firestore
    await setDoc(doc(collection(window.DB,'summaries')),{
      month,title:`Zone Submission Summary`,text,
      generatedBy:CU.name,createdAt:serverTimestamp(),createdAtStr:new Date().toLocaleDateString(),
      totalFiles:uploads.length,totalGaps,gapBadges:gapBadges.slice(0,20),
      zoneCount:zones.length
    });

    status.innerHTML='<div style="color:#4ade80;font-size:12px;padding:8px;">✅ Summary generated and saved! Visible to all users.</div>';
    toast('✅ Summary saved — everyone can now see it!');
    setTimeout(()=>renderSummaries(),1200);
  }catch(e){
    status.innerHTML=`<div style="color:#fca5a5;font-size:12px;padding:8px;">Error: ${esc(e.message)}</div>`;
  }
  btn.disabled=false;
}

// ════════════════════════════════════════════════════
function buildSidebar(){
  const isAdmin = CU && (CU.role==='admin'||CU.role==='coordinator'); // Admin (Arun) only
  const isCons  = CU && CU.role==='consultant'; // Consultant (SMM) — view/download all
  const secs = window.SECTIONS||{};
  const mods = window.MODULES||{};

  // Apply zone-based filtering for zone leaders, dept-based filtering for dept leaders
  const myZone = (CU && CU.role==='leader') ? window.MY_ZONE : null;
  const myDept = (CU && CU.role==='dept_leader') ? window.MY_DEPT : null;
  const myEntity = myZone || myDept;
  const allowedModules = myEntity ? myEntity.allowedModules : null; // null = no restriction
  const allowedSections = myEntity ? myEntity.allowedSections : null; // null = no restriction

  // Group sections by module number — filtered for this zone's permissions
  const byMod = {};
  Object.values(secs).forEach(s=>{
    const m = s.mod||1;
    if(allowedModules && !allowedModules.includes(m)) return; // module hidden for this zone
    if(allowedSections && !allowedSections.includes(s.id)) return; // section hidden for this zone
    if(!byMod[m]) byMod[m]=[];
    byMod[m].push(s);
  });

  // Sort modules by order
  const modNums = Object.keys(byMod).map(Number).sort((a,b)=>a-b);

  // Find module name from MODULES store
  function modName(num){
    const found = Object.values(mods).find(m=>m.order===num||m.id==='mod'+num);
    return found ? found.name : 'Module '+num;
  }
  function modColor(num){
    const found = Object.values(mods).find(m=>m.order===num||m.id==='mod'+num);
    return found?.colorKey||'blue';
  }
  const colorMap = {green:'var(--green)',purple:'var(--purple)',blue:'var(--blue)',amber:'var(--amber)',red:'var(--red)',navy:'var(--navy)'};

  let html = `
    <div class="siGrp">Overview</div>
    <div class="siItem${CP==='dash'?' act':''}" data-p="dash"><span class="siIcon">🏠</span>Dashboard</div>`;

  modNums.forEach(num=>{
    const color = colorMap[modColor(num)]||'var(--blue)';
    html += `<div class="siGrp" style="color:${color}">${esc(modName(num))}</div>`;
    byMod[num].sort((a,b)=>(a.order||0)-(b.order||0)).forEach(s=>{
      const active = CP===s.id?' act':'';
      html += `<div class="siItem${active}" data-p="${s.id}" data-mod="${num}" style="${active?'border-left-color:'+color+';background:'+color+'18;color:'+color:''}"><span class="siIcon">${s.icon||'📄'}</span>${esc(s.label)}</div>`;
    });
  });

  if(isAdmin||isCons){
    html += `<div class="siGrp" id="siAdmGrp">Admin</div>
    <div class="siItem${CP==='ai_sum'?' act':''}" data-p="ai_sum" id="siAI"><span class="siIcon">🤖</span>AI Summaries</div>
    <div class="siItem${CP==='all_files'?' act':''}" data-p="all_files" id="siFiles"><span class="siIcon">📂</span>All Files</div>`;
    if(isAdmin){
      html += `
    <div class="siItem${CP==='modules_admin'?' act':''}" data-p="modules_admin" id="siMods"><span class="siIcon">🧩</span>Modules & Sections</div>
    <div class="siItem${CP==='users'?' act':''}" data-p="users" id="siUsers"><span class="siIcon">👥</span>Users</div>
    <div class="siItem${CP==='zones'?' act':''}" data-p="zones" id="siZones"><span class="siIcon">🗂️</span>Zones</div>
    <div class="siItem${CP==='departments'?' act':''}" data-p="departments" id="siDepts"><span class="siIcon">🏢</span>Departments</div>`;
    }
  }

  const el = document.getElementById('sidebarContent');
  if(el) el.innerHTML = html;

  // Re-attach click listener
  const sideEl = document.getElementById('sideEl');
  if(sideEl){
    sideEl.onclick = null;
    sideEl.addEventListener('click', e=>{
      const item = e.target.closest('.siItem[data-p]');
      if(item) goto(item.dataset.p);
    });
  }
}

  } else {
    customWrap.style.display = 'none';
    // Pre-fill the hidden name field with the tool name so saveMod can use it
    if(!$('mMName')) return;
    $('mMName').value = toolName;
  }
}

async function saveMod(editId){
  const toolSel = $('mMTool')?.value || '';
  const customName = $('mMName')?.value?.trim() || '';
  const name = (toolSel && toolSel !== 'Custom / Other') ? toolSel : customName;
  const icon = $('mMIcon')?.value || findToolIcon(name);
  const order=parseInt($('mMOrder').value)||1;
  const colorKey=$('mMColor').value;
  if(!name){toast('Select a tool or enter a custom module name.');return;}

  const existing = Object.values(window.MODULES||{});
  const clash = existing.find(m => (m.order===order) && m.id!==editId);
  if(clash){
    toast(`⚠️ Order ${order} is already used by "${clash.name}". Choose a different number.`,5000);
    return;
  }

  const {doc,setDoc,collection,addDoc}=window.FS;
  if(editId) await setDoc(doc(window.DB,'modules',editId),{name,order,colorKey,icon},{merge:true});
  else await addDoc(collection(window.DB,'modules'),{name,order,colorKey,icon});
  closeModal();toast('✅ Module saved.');
  await loadSectionsAndModules();
  renderModulesAdmin();
}

async function resetAllModules(){
  if(!confirm('This will permanently delete ALL modules and ALL sections (and their checklist items). Uploaded files will remain in the database but will no longer be linked to any visible section. This cannot be undone. Continue?'))return;
  if(!confirm('Are you absolutely sure? Type OK in the next box only if you really want to wipe everything.'))return;
  const {collection,getDocs,doc,deleteDoc}=window.FS;
  const [modSnap,secSnap]=await Promise.all([
    getDocs(collection(window.DB,'modules')),
    getDocs(collection(window.DB,'sections'))
  ]);
  for(const d of secSnap.docs) await deleteDoc(doc(window.DB,'sections',d.id));
  for(const d of modSnap.docs) await deleteDoc(doc(window.DB,'modules',d.id));
  window.SECTIONS = {};
  window.MODULES = {};
  toast('🗑️ All modules and sections cleared. Start fresh by adding a new module.', 5000);
  buildSidebar();
  renderModulesAdmin();
}

async function delModule(id){
  if(!confirm('Delete this module? Its sections will also be deleted since they cannot exist without a module.'))return;
  const {doc,deleteDoc,collection,getDocs,query,where}=window.FS;
  // Delete all sections that belong to this module
  const secsToDelete = Object.values(window.SECTIONS||{}).filter(s=>s.modId===id);
  for(const s of secsToDelete){
    await deleteDoc(doc(window.DB,'sections',s.id));
  }
  await deleteDoc(doc(window.DB,'modules',id));
  toast('Module and its sections deleted.');
  await loadSectionsAndModules();
  renderModulesAdmin();
}

  if(toolName === 'Custom / Other' || toolName === ''){
    customWrap.style.display = '';

async function saveSec(editId, modId, modOrder){
  const toolSel = $('sTool')?.value || '';
  const customName = $('sName')?.value?.trim() || '';
  const label = (toolSel && toolSel !== 'Custom / Other') ? toolSel : customName;
  const icon = $('sIcon')?.value || findToolIcon(label);
  const desc = $('sDesc').value.trim();
  const order = parseInt($('sOrder').value)||1;
  let sId = $('sId').value.trim();
  if(!sId) sId = label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');

  if(!sId){toast('Could not generate a section ID — type one manually.');return;}

  const {doc,setDoc}=window.FS;
  const existingSec = window.SECTIONS[sId];
  const required = existingSec?.required || []; // preserve any existing requirements when editing
  await setDoc(doc(window.DB,'sections',sId),{id:sId,label,desc,icon,order,mod:modOrder,modId,required},{merge:true});
  closeModal();toast('✅ Section saved.');
  await loadSectionsAndModules();
  renderModulesAdmin();
}

  const nameEl = document.getElementById('linkName-'+folderKey);

  const monEl  = document.getElementById('upMon-'+folderKey);
  const noteEl = document.getElementById('upNote-'+folderKey);
  const name   = nameEl ? nameEl.value.trim() : '';

  if(!url || !url.startsWith('http')){ toast('Enter a valid shareable link (must start with http).'); return; }

  const {collection,addDoc,serverTimestamp}=window.FS;
  await addDoc(collection(window.DB,'uploads'),{

<script>
async function downloadFile(uploadId, filename){
  try{
    toast('Preparing download...');
    const {doc,getDoc}=window.FS;
    const snap=await getDoc(doc(window.DB,'uploads',uploadId));
    if(!snap.exists()){toast('File not found.');return;}
    const b64=snap.data().fileData;
    if(!b64){toast('No file data stored.');return;}
    // Parse base64 data URL into Blob without fetch()
    const commaIdx=b64.indexOf(',');
    const mime=b64.substring(5,b64.indexOf(';'));
    const byteStr=atob(b64.substring(commaIdx+1));
    const arr=new Uint8Array(byteStr.length);
    for(let i=0;i<byteStr.length;i++) arr[i]=byteStr.charCodeAt(i);
    const blob=new Blob([arr],{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1500);
    toast('Download complete!');
  }catch(e){toast('Download error: '+e.message);}
}
</script>
